<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#0f0f1a"><title>Mad Island 助手</title>
<style>:root{--bg:#0f0f1a;--card:#191932;--accent:#ff5e7a;--green:#2dd4a0;--amber:#f5a623;--blue:#5b9cf5;--text:#e8e8f0;--muted:#9898b0;--border:rgba(255,255,255,.07);--radius:10px;--mono:"SF Mono",Consolas,monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(255,94,122,.04),transparent)}
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 14px}
.topbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:50px}
.topbar-logo{font-size:14px;font-weight:700;white-space:nowrap}.topbar-logo span{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
.topbar-nav{display:flex;gap:2px}.topbar-nav button{padding:6px 14px;border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;border-radius:16px;font-weight:500}
.topbar-nav button:hover{color:var(--text)}.topbar-nav button.active{background:var(--accent);color:#fff}
.adult-toggle{display:flex;align-items:center;gap:6px;margin-left:8px;cursor:pointer;user-select:none;font-size:11px;color:var(--muted);white-space:nowrap}
.adult-toggle .sw{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.15);position:relative;transition:background .2s;flex-shrink:0}
.adult-toggle .sw.on{background:var(--accent)}
.adult-toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.adult-toggle .sw.on::after{transform:translateX(16px)}
.page{display:none;position:relative;z-index:1;height:calc(100dvh - 50px)}.page.active{display:flex}
.split{display:flex;width:100%;height:100%}.split-sidebar{width:240px;flex-shrink:0;overflow-y:auto;padding:16px 10px;background:rgba(0,0,0,.12);border-right:1px solid var(--border)}
.split-main{flex:1;overflow-y:auto;padding:20px 24px 60px}
.side-search{position:relative;margin-bottom:12px}.side-search input{width:100%;padding:9px 12px 9px 32px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none}
.side-search::before{content:"🔍";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px}
.side-item{display:flex;align-items:center;gap:8px;width:100%;padding:9px 11px;border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;border-radius:7px;text-align:left}
.side-item:hover{background:rgba(255,255,255,.03);color:var(--text)}.side-item.active{background:rgba(255,94,122,.1);color:var(--accent);font-weight:600}
.side-item .emoji{font-size:14px;flex-shrink:0}.badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600;margin-left:auto}
.badge-c{background:rgba(91,156,245,.15);color:var(--blue)}.badge-f{background:rgba(255,94,122,.15);color:var(--accent)}
.u-group-title{font-size:13px;font-weight:600;color:var(--amber);margin:20px 0 8px;position:sticky;top:0;background:var(--bg);padding:4px 0;z-index:2}
.u-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;border-left:3px solid var(--border);font-size:13px;line-height:1.7}
.u-card.t0{border-left-color:var(--blue)}.u-card.t1{border-left-color:var(--amber)}.u-card.t2{border-left-color:var(--accent)}.u-card.t3{border-left-color:#f44}
.u-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.u-ver{font-weight:700;color:#fff;font-size:13px}.u-tag{padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.t-c{background:rgba(91,156,245,.15);color:var(--blue)}.t-m{background:rgba(245,166,35,.15);color:var(--amber)}
.t-f{background:rgba(255,94,122,.15);color:var(--accent)}.t-h{background:rgba(255,68,68,.15);color:#f66}
.u-date{font-size:10px;color:var(--muted);margin-left:6px}.u-body{color:var(--muted)}.hl-a{color:var(--green);font-weight:500}.hl-f{color:var(--amber);font-weight:500}
.guide-content h2{font-size:18px;color:#fff;margin-bottom:14px}.guide-content h3{font-size:14px;color:var(--amber);margin:16px 0 8px}
.guide-content p{font-size:13px;color:var(--muted);margin-bottom:8px;line-height:1.7}
.guide-content ul,.guide-content ol{padding-left:20px;margin-bottom:12px}
.guide-content li{font-size:13px;color:var(--muted);margin-bottom:4px;line-height:1.7}.guide-content li strong{color:var(--text)}
.tbl{overflow-x:auto;margin:8px 0 16px}.tbl table{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 11px;text-align:left;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--muted)}.tbl td:last-child{white-space:normal}
.tbl tr:hover td{background:rgba(255,255,255,.01)}.td-k{font-weight:600;color:var(--text)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}.empty .ic{font-size:36px;margin-bottom:10px;display:block}
.empty h3{font-size:14px;color:var(--text);margin-bottom:4px}.empty p{font-size:12px}
code{background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--green);font-family:var(--mono)}
.crystal{display:inline-flex;align-items:center;gap:6px;margin:0 12px 0 0}.crystal .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.about{padding:30px;text-align:center;max-width:600px;margin:0 auto}
.about .nums{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}
.about .nc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 10px}
.about .nc .big{font-size:28px;font-weight:800;color:#fff}.about .nc .lbl{font-size:10px;color:var(--muted);margin-top:2px}
@media(max-width:768px){.split-sidebar{width:90px;padding:10px 4px}.side-item{padding:8px 4px;font-size:10px;gap:3px;flex-direction:column;text-align:center}.side-item .emoji{font-size:16px}.side-item .lab{display:none}.badge{display:none}.split-main{padding:14px}.topbar-nav button{padding:5px 10px;font-size:11px}}</style></head><body>
<header class="topbar"><div class="topbar-inner"><div class="topbar-logo">🏝️ Mad Island<span>助手</span></div><div style="display:flex;align-items:center;gap:10px"><nav class="topbar-nav"><button class="active" onclick="swTab('updates')">更新</button><button onclick="swTab('guide')">攻略</button><button onclick="swTab('cheats')">作弊码</button><button onclick="swTab('about')">关于</button></nav><div class="adult-toggle" onclick="toggleAdult()" title="筛选18+内容"><div class="sw on" id="adultSw"></div><span id="adultLabel">18+</span></div></div></div></header>
<div id="tab-updates" class="page active"><div class="split"><aside class="split-sidebar"><div class="side-search"><input placeholder="搜更新..." oninput="renderUp()" id="upSearch"></div>
<button class="side-item active" onclick="setFilter('all')"><span class="emoji">📋</span><span class="lab">全部更新</span><span class="badge badge-c" id="cnt-all">0</span></button>
<button class="side-item" onclick="setFilter('content')"><span class="emoji">🟢</span><span class="lab">新增内容</span><span class="badge badge-c" id="cnt-content">0</span></button>
<button class="side-item" onclick="setFilter('minor')"><span class="emoji">🔵</span><span class="lab">小更新</span><span class="badge" id="cnt-minor">0</span></button>
<button class="side-item" onclick="setFilter('bugfix')"><span class="emoji">🟡</span><span class="lab">Bug修复</span><span class="badge badge-f" id="cnt-bugfix">0</span></button>
<button class="side-item" onclick="setFilter('hotfix')"><span class="emoji">🔴</span><span class="lab">热修复</span><span class="badge" id="cnt-hotfix">0</span></button>
</aside><main class="split-main" id="upList"></main></div></div>
<div id="tab-guide" class="page"><div class="split"><aside class="split-sidebar"><div class="side-search"><input placeholder="搜攻略..." oninput="filterGuideSidebar()" id="guideSearch"></div><div id="guideSidebar"></div></aside><main class="split-main guide-content" id="guideMain"></main></div></div>
<div id="tab-cheats" class="page"><div class="split"><aside class="split-sidebar"><div class="side-search"><input placeholder="搜代码..." oninput="renderCheats()" id="cheatSearch"></div>
<button class="side-item active" onclick="selCheat('cmds')" data-ctab="cmds"><span class="emoji">⌨️</span><span class="lab">命令</span></button>
<button class="side-item" onclick="selCheat('items')" data-ctab="items"><span class="emoji">📦</span><span class="lab">物品</span></button>
<button class="side-item" onclick="selCheat('weapons')" data-ctab="weapons"><span class="emoji">⚔️</span><span class="lab">武器</span></button>
<button class="side-item" onclick="selCheat('clothing')" data-ctab="clothing"><span class="emoji">👕</span><span class="lab">服装</span></button>
<button class="side-item" onclick="selCheat('npcs')" data-ctab="npcs"><span class="emoji">👤</span><span class="lab">NPC</span></button>
</aside><main class="split-main" id="cheatPanels"></main></div></div>
<div id="tab-about" class="page"><div class="about"><h2 style="font-size:18px">🏝️ Mad Island 助手</h2><p style="color:var(--muted);font-size:13px;margin-top:4px">更新追踪+攻略+作弊码·手机电脑通用</p><div class="nums" id="aboutNums"></div><p style="font-size:11px;color:var(--muted)">Steam API|贴吧/B站/PTT/日本Wiki|catalog.json</p></div></div>
<script src="./data.js"></script><script src="./cheats.js"></script><script src="./guide-data.js"></script><script src="./app-logic.js"></script></body></html>
